<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e90ff, #6a5acd);
  color: white;
  text-align: center;
}

/* TITLE */
h1 {
  margin: 10px 0;
  text-shadow: 0 0 10px black;
  font-size:100px;
}

/* HANDS */
.hands {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin: 20px 0;
  font-size: 55px;
}

.hand-box {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hand {
  transition: transform 0.3s ease;
  font-size:100px;
}

/* SCOREBOARD */
.scoreboard {
  margin: 10px auto;
  padding: 10px;
  width: 80%;
  max-width: 320px;
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  box-shadow: 0 0 10px black;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

button {
  background: #ff69b4;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 0 8px black;
}

button:hover {
  transform: scale(1.1);
  background: #ff4da6;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

/* MOBILE */
@media (max-width: 600px) {
  .hands {
    font-size: 40px;
    gap: 20px;
  }

  button {
    width: 80%;
  }
}
</style>
</head>

<body>

<h1><big> Rock Paper Scissors</big></h1>

<div class="hands">
  <div class="hand-box">
    <div>Player</div>
    <div id="playerHand" class="hand">✊</div>
  </div>

  <div class="hand-box">
    <div>Computer</div>
    <div id="computerHand" class="hand">✊</div>
  </div>
</div>

<div class="scoreboard">
  <p>Player Score: <span id="pScore">0</span></p>
  <p>Computer Score: <span id="cScore">0</span></p>
  <p>Draws: <span id="dScore">0</span></p>
  <p>Rounds: <span id="round">0</span>/5</p>
</div>

<div class="buttons">
  <button onclick="play('rock')">Rock</button>
  <button onclick="play('paper')">Paper</button>
  <button onclick="play('scissors')">Scissors</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h2 id="resultText"></h2>
    <button onclick="resetGame()">Play Again</button>
  </div>
</div>

<script>
let p = 0, c = 0, d = 0, r = 0;

function play(choice) {
  if (r >= 5) return;

  const options = ["rock", "paper", "scissors"];
  const comp = options[Math.floor(Math.random() * 3)];

  document.getElementById("playerHand").innerText = getEmoji(choice);
  document.getElementById("computerHand").innerText = getEmoji(comp);

  if (choice === comp) {
    d++;
  } else if (
    (choice === "rock" && comp === "scissors") ||
    (choice === "paper" && comp === "rock") ||
    (choice === "scissors" && comp === "paper")
  ) {
    p++;
  } else {
    c++;
  }

  r++;
  update();

  if (r === 5) {
    let msg =
      p > c ? "🎉 You Win!" :
      c > p ? "💻 Computer Wins!" :
      "🤝 It's a Draw!";

    showPopup(msg);
  }
}

function getEmoji(x) {
  if (x === "rock") return "✊";
  if (x === "paper") return "✋";
  if (x === "scissors") return "✌️";
}

function update() {
  document.getElementById("pScore").innerText = p;
  document.getElementById("cScore").innerText = c;
  document.getElementById("dScore").innerText = d;
  document.getElementById("round").innerText = r;
}

function showPopup(msg) {
  document.getElementById("resultText").innerText = msg;
  document.getElementById("popup").style.display = "flex";
}

function resetGame() {
  p = 0;
  c = 0;
  d = 0;
  r = 0;

  update();

  document.getElementById("playerHand").innerText = "✊";
  document.getElementById("computerHand").innerText = "✊";

  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
