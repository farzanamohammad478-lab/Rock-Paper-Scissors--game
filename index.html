<!doctype html>
<html>
    <head>
        <title>rock paper scissors</title>
     <meta name="viewport"
     content="width=device-width,initial-scale=1.0">
    </head>
   <style>
       *{
           visibility: visible !important;
           opacity: 1 !important;
           box-sizing:border-box;
       }
     h1{
        color:yellow;
        font-weight: 100%;
         font-size: 1.6rem;
        animation:pop 1s ease;
        text-align: center;
    }
       @keyframes pop{
           0%{
               transform: scale(0);
               opacity:0;
           }
           100%{
               transform: scale(1);
               opacity:1;
               }
       }
    body{
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        margin:0;
        padding:0;
        justify-content:center;
         background:linear-gradient(135deg,#2193b0,#6dd5ed);
        text-align: center;
        font-family: Arial;
    }
    .game{
        display:flex;
        justify-content:center;
        gap:100px;
        align-items: center;
         margin-top: 50px;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        margin:0;
    
    }
    .hand{
        font-size: 120px;
        line-height:1;
        width:100%;
        height:180px;
        display:flex;
        justify-content: center;
        align-items: center;
        max-width:100%;
    }
    h2{
        color:white;
        text-align: center;
    }
    .box{
        text-align: center;
    }
    
    #computer{
        transform:scaleX(-1);
    }
    @media(max-width: 600px){
    button{
        display:block;
        padding:20px;
        width:80px;
        max-width:250px;
        margin:10px auto;
        cursor:pointer;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        border-radius: 20px;
        box-shadow:  2px 2px 2px black;
        transition :all 0.3s ease;
    }
        h1{
            font-size:22px;
        }
          #player{
        font-size: 160px;
              margin: 5px 0;
    }
    }
       
    button:hover{
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    }
    .big{
        font-size: 50px;
        
      
    }
    #again{
        display:none;
    }
    .score{
        color:black;
        background-color: yellow;
        height:120px;
        width:100%;
        font-size: 20px;
        margin:20px;
        max-width:100%;
    }
    p{
        color: black;
        font-size: large;
    }
  
    #computer{
        font-size: 150px;
    }
       #main{
           width:2000px;
           background:linear-gradient(135deg,#2193b0,#6dd5ed);
       }
      
       
       html,body{
           margin:0;
           padding:0;
           width:100%;
           overflow-x:hidden;
           overflow-y:auto;
       }
   </style>
    <body>
       
        <div id="main">
        <h1><u><big>Rock Paper scissors</big></u></h1>
        <div class="game">
            <div class="box">
                <h1>player</h1>
            <h2 id="player">✊</h2>
            
                
            </div>
        <div class="box">
            <h1>computer</h1>
                <h2 id="computer">✊</h2>
                
                    
                </div>
            </div>
        
        <center>
        <div class="score">
            player Score:<span id="playerScore">0</span><br>
            computer Score:<span id="computerScore">0</span><br>
            Draw Score:<span id="drawScore">0</span>
        </div>
        </center>
        <br>
        <p id="result"><big>choose an weapon</big></p>
        <button onclick="play('rock')">
            <span class="big">✊</span>Rock
        </button>
        <button onclick="play('paper')">
            <span class="big">🖐</span>paper
        </button>
        <button onclick="play('scissors')">
            <span class="big">✌</span>scissors
        </button>
        <br>
        <br>


        <script>
            const hands={
                rock:"✊",
                paper:"🖐",
                scissors:"✌"
            };
            let playerScore=0;
            let computerScore=0;
            let drawScore=0;
            let round=0;
            
            function play(playerChoice){
            
            
const choices=["rock","paper","scissors"];
const computerChoice=choices[Math.floor(Math.random()*3)];
document.getElementById("player").innerHTML=hands[playerChoice];
document.getElementById("computer").innerHTML=hands[computerChoice];
            
   if(playerChoice===computerChoice){
   drawScore++;
 document.getElementById("drawScore").innerHTML= drawScore;
 document.getElementById("result").innerHTML="Draw!";
               
     }
     else if(
(playerChoice=="rock" && computerChoice=="scissors")||
 (playerChoice=="paper"&& computerChoice=="rock")||
(playerChoice=="scissors"&& computerChoice=="paper")
              )
              {
     playerScore++;
 document.getElementById("playerScore").innerHTML=playerScore;
 document.getElementById("result").innerHTML="you win!";
            }
            else
            {
                computerScore++;
            document.getElementById("computerScore").innerHTML=computerScore;
            document.getElementById("result").innerHTML="computer wins!";
            }
            round++;
               if(round === 5){
                alert("Game Over!");
                location.reload();
               }
          }

           
        </script>
        </div>

    </body>
</html>
